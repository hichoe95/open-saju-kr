<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="200" cy="140" r="130" fill="url(#chartGlow)" opacity="0.25"/>
  
  <!-- Stars scattered -->
  <circle cx="70" cy="50" r="2.5" fill="#F59E0B"/>
  <circle cx="330" cy="70" r="2" fill="#8B5CF6"/>
  <circle cx="50" cy="200" r="2" fill="#4F46E5"/>
  <circle cx="350" cy="220" r="2.5" fill="#F59E0B"/>
  <circle cx="90" cy="260" r="1.5" fill="#7C3AED"/>
  <circle cx="310" cy="40" r="2" fill="#4F46E5"/>
  
  <!-- Radar chart background pentagon -->
  <polygon points="200,60 280,115 255,205 145,205 120,115" 
           fill="url(#radarBg)" stroke="url(#radarStroke)" stroke-width="1.5" opacity="0.3"/>
  <polygon points="200,85 255,125 237,190 163,190 145,125" 
           fill="none" stroke="url(#radarStroke)" stroke-width="0.5" opacity="0.2"/>
  <polygon points="200,110 230,135 218,175 182,175 170,135" 
           fill="none" stroke="url(#radarStroke)" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Actual radar shape (stats visualization) -->
  <polygon points="200,70 270,120 240,195 155,180 135,115" 
           fill="url(#radarFill)" stroke="url(#radarStroke)" stroke-width="2" opacity="0.8"/>
  
  <!-- Center point -->
  <circle cx="200" cy="140" r="6" fill="url(#centerGradient)"/>
  
  <!-- Five element icons around radar -->
  <!-- Wood (목) - top -->
  <g class="element-icon" data-element="wood">
    <circle cx="200" cy="35" r="22" fill="url(#woodGradient)" opacity="0.9"/>
    <text x="200" y="41" font-size="14" fill="white" text-anchor="middle" font-weight="600">木</text>
  </g>
  
  <!-- Fire (화) - top right -->
  <g class="element-icon" data-element="fire">
    <circle cx="295" cy="100" r="22" fill="url(#fireGradient)" opacity="0.9"/>
    <text x="295" y="106" font-size="14" fill="white" text-anchor="middle" font-weight="600">火</text>
  </g>
  
  <!-- Metal (금) - bottom right -->
  <g class="element-icon" data-element="metal">
    <circle cx="270" cy="220" r="22" fill="url(#metalGradient)" opacity="0.9"/>
    <text x="270" y="226" font-size="14" fill="white" text-anchor="middle" font-weight="600">金</text>
  </g>
  
  <!-- Water (수) - bottom left -->
  <g class="element-icon" data-element="water">
    <circle cx="130" cy="220" r="22" fill="url(#waterGradient)" opacity="0.9"/>
    <text x="130" y="226" font-size="14" fill="white" text-anchor="middle" font-weight="600">水</text>
  </g>
  
  <!-- Earth (토) - top left -->
  <g class="element-icon" data-element="earth">
    <circle cx="105" cy="100" r="22" fill="url(#earthGradient)" opacity="0.9"/>
    <text x="105" y="106" font-size="14" fill="white" text-anchor="middle" font-weight="600">土</text>
  </g>
  
  <!-- Connecting lines from center to elements -->
  <line x1="200" y1="140" x2="200" y2="57" stroke="url(#lineGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="140" x2="273" y2="100" stroke="url(#lineGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="140" x2="248" y2="220" stroke="url(#lineGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="140" x2="152" y2="220" stroke="url(#lineGradient)" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="140" x2="127" y2="100" stroke="url(#lineGradient)" stroke-width="1" opacity="0.4"/>
  
  <!-- Decorative outer ring -->
  <circle cx="200" cy="140" r="115" stroke="url(#ringGradient)" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Balance indicator label -->
  <rect x="140" y="265" width="120" height="28" rx="14" fill="url(#labelBg)" opacity="0.9"/>
  <text x="200" y="284" font-size="12" fill="white" text-anchor="middle" font-weight="500">오행 밸런스</text>
  
  <defs>
    <radialGradient id="chartGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="radarBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="radarFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="radarStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="centerGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="labelBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Element gradients -->
    <linearGradient id="woodGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="fireGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="earthGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="metalGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="waterGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
</svg>
