<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="200" cy="150" r="140" fill="url(#chatGlow)" opacity="0.2"/>
  
  <!-- Stars scattered -->
  <circle cx="50" cy="35" r="2.5" fill="#F59E0B"/>
  <circle cx="350" cy="50" r="2" fill="#8B5CF6"/>
  <circle cx="35" cy="190" r="2" fill="#4F46E5"/>
  <circle cx="365" cy="210" r="2.5" fill="#F59E0B"/>
  <circle cx="60" cy="270" r="1.5" fill="#7C3AED"/>
  <circle cx="340" cy="260" r="2" fill="#4F46E5"/>
  
  <!-- AI Avatar (left side) -->
  <g transform="translate(50, 80)">
    <circle cx="40" cy="40" r="38" fill="url(#aiBg)" stroke="url(#aiStroke)" stroke-width="2"/>
    <!-- AI face - robot style -->
    <rect x="24" y="30" width="12" height="8" rx="2" fill="#A78BFA"/>
    <rect x="44" y="30" width="12" height="8" rx="2" fill="#A78BFA"/>
    <rect x="28" y="46" width="24" height="4" rx="2" fill="#A78BFA"/>
    <!-- Antenna -->
    <circle cx="40" cy="8" r="5" fill="#F59E0B"/>
    <rect x="38" y="8" width="4" height="12" fill="#8B5CF6"/>
  </g>
  
  <!-- User message bubble (right side, top) -->
  <g transform="translate(150, 50)">
    <rect x="0" y="0" width="200" height="50" rx="20" fill="url(#userBubbleBg)"/>
    <text x="20" y="30" font-size="13" fill="white" font-weight="500">이직해도 될까요? 🤔</text>
    <!-- Bubble tail -->
    <path d="M180 50 L200 65 L160 50" fill="url(#userBubbleBg)"/>
  </g>
  
  <!-- AI response bubble (left side, middle) -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="250" height="80" rx="20" fill="url(#aiBubbleBg)" stroke="url(#aiBubbleStroke)" stroke-width="1"/>
    <!-- Bubble tail -->
    <path d="M20 80 L0 95 L40 80" fill="url(#aiBubbleBg)"/>
    
    <!-- AI response content -->
    <text x="20" y="28" font-size="12" fill="white" font-weight="500">지금은 변화의 기운이 강해요! 🌟</text>
    <text x="20" y="48" font-size="11" fill="#C4B5FD">올해 하반기 특히 좋은 기회가</text>
    <text x="20" y="65" font-size="11" fill="#C4B5FD">찾아올 것으로 보입니다.</text>
  </g>
  
  <!-- Typing indicator bubble -->
  <g transform="translate(100, 215)">
    <rect x="0" y="0" width="80" height="35" rx="17" fill="url(#typingBg)" opacity="0.9"/>
    <!-- Typing dots -->
    <circle cx="22" cy="17" r="5" fill="white" opacity="0.9" class="typing-dot"/>
    <circle cx="40" cy="17" r="5" fill="white" opacity="0.7" class="typing-dot"/>
    <circle cx="58" cy="17" r="5" fill="white" opacity="0.5" class="typing-dot"/>
  </g>
  
  <!-- Quick question chips at bottom -->
  <g transform="translate(40, 260)">
    <rect x="0" y="0" width="95" height="30" rx="15" fill="url(#chipBg)" stroke="#7C3AED" stroke-width="1"/>
    <text x="47" y="20" font-size="11" fill="white" text-anchor="middle" font-weight="500">💕 연애운</text>
  </g>
  <g transform="translate(145, 260)">
    <rect x="0" y="0" width="95" height="30" rx="15" fill="url(#chipBg)" stroke="#7C3AED" stroke-width="1"/>
    <text x="47" y="20" font-size="11" fill="white" text-anchor="middle" font-weight="500">💰 재물운</text>
  </g>
  <g transform="translate(250, 260)">
    <rect x="0" y="0" width="95" height="30" rx="15" fill="url(#chipBg)" stroke="#7C3AED" stroke-width="1"/>
    <text x="47" y="20" font-size="11" fill="white" text-anchor="middle" font-weight="500">💼 커리어</text>
  </g>
  
  <!-- Sparkle decorations -->
  <g transform="translate(320, 100)">
    <path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" fill="#F59E0B" opacity="0.8"/>
  </g>
  <g transform="translate(90, 200)">
    <path d="M8 0 L9.5 6 L16 8 L9.5 10 L8 16 L6.5 10 L0 8 L6.5 6 Z" fill="#8B5CF6" opacity="0.7"/>
  </g>
  
  <!-- Chat label -->
  <rect x="280" y="180" width="85" height="28" rx="14" fill="url(#labelBg)" opacity="0.9"/>
  <text x="322" y="199" font-size="11" fill="white" text-anchor="middle" font-weight="500">🤖 AI 상담</text>
  
  <defs>
    <radialGradient id="chatGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="aiStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="userBubbleBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="aiBubbleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="aiBubbleStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="typingBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="chipBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3730A3" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="labelBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
</svg>
