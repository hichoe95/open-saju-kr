<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="200" cy="150" r="140" fill="url(#flowGlow)" opacity="0.2"/>
  
  <!-- Stars scattered -->
  <circle cx="60" cy="40" r="2.5" fill="#F59E0B"/>
  <circle cx="340" cy="60" r="2" fill="#8B5CF6"/>
  <circle cx="40" cy="180" r="2" fill="#4F46E5"/>
  <circle cx="360" cy="200" r="2.5" fill="#F59E0B"/>
  <circle cx="80" cy="270" r="1.5" fill="#7C3AED"/>
  
  <!-- Main timeline line -->
  <path d="M60 150 Q 140 100 200 150 Q 260 200 340 150" 
        stroke="url(#timelineGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Timeline glow effect -->
  <path d="M60 150 Q 140 100 200 150 Q 260 200 340 150" 
        stroke="url(#timelineGlow)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Year markers on timeline -->
  <!-- Past -->
  <g class="timeline-dot" data-period="past">
    <circle cx="90" cy="130" r="12" fill="url(#dotPast)" opacity="0.7"/>
    <circle cx="90" cy="130" r="6" fill="white"/>
  </g>
  
  <!-- 10 years ago -->
  <g class="timeline-dot" data-period="decade">
    <circle cx="140" cy="115" r="14" fill="url(#dotDecade)" opacity="0.8"/>
    <circle cx="140" cy="115" r="7" fill="white"/>
    <text x="140" y="90" font-size="10" fill="#7C3AED" text-anchor="middle" font-weight="500">10년 전</text>
  </g>
  
  <!-- Current (NOW - highlighted) -->
  <g class="timeline-dot" data-period="now">
    <circle cx="200" cy="150" r="20" fill="url(#dotNow)" opacity="1"/>
    <circle cx="200" cy="150" r="25" stroke="url(#nowRing)" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="200" cy="150" r="30" stroke="url(#nowRing)" stroke-width="1" fill="none" opacity="0.3"/>
    <circle cx="200" cy="150" r="10" fill="white"/>
    <text x="200" y="122" font-size="11" fill="#4F46E5" text-anchor="middle" font-weight="700">NOW</text>
  </g>
  
  <!-- 10 years later -->
  <g class="timeline-dot" data-period="future1">
    <circle cx="260" cy="175" r="14" fill="url(#dotFuture1)" opacity="0.8"/>
    <circle cx="260" cy="175" r="7" fill="white"/>
    <text x="260" y="200" font-size="10" fill="#7C3AED" text-anchor="middle" font-weight="500">10년 후</text>
  </g>
  
  <!-- Far future -->
  <g class="timeline-dot" data-period="future2">
    <circle cx="310" cy="160" r="12" fill="url(#dotFuture2)" opacity="0.7"/>
    <circle cx="310" cy="160" r="6" fill="white"/>
  </g>
  
  <!-- Calendar icon at top -->
  <g transform="translate(165, 30)">
    <rect x="0" y="8" width="70" height="55" rx="8" fill="url(#calendarBg)" stroke="url(#calendarStroke)" stroke-width="1.5"/>
    <rect x="0" y="8" width="70" height="18" rx="8" fill="url(#calendarHeader)"/>
    <rect x="8" y="0" width="8" height="16" rx="2" fill="#7C3AED"/>
    <rect x="54" y="0" width="8" height="16" rx="2" fill="#7C3AED"/>
    <!-- Calendar dots -->
    <circle cx="20" cy="40" r="4" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="35" cy="40" r="4" fill="#F59E0B"/>
    <circle cx="50" cy="40" r="4" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="20" cy="52" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="35" cy="52" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="50" cy="52" r="4" fill="#8B5CF6" opacity="0.4"/>
  </g>
  
  <!-- Monthly/Daily indicators at bottom -->
  <g transform="translate(80, 230)">
    <!-- Month cards -->
    <rect x="0" y="0" width="55" height="45" rx="8" fill="url(#cardBg)" opacity="0.9"/>
    <text x="27" y="18" font-size="9" fill="#A78BFA" text-anchor="middle" font-weight="500">이번 달</text>
    <text x="27" y="35" font-size="14" fill="white" text-anchor="middle" font-weight="700">85점</text>
    
    <rect x="65" y="0" width="55" height="45" rx="8" fill="url(#cardBg)" opacity="0.9"/>
    <text x="92" y="18" font-size="9" fill="#A78BFA" text-anchor="middle" font-weight="500">오늘</text>
    <text x="92" y="35" font-size="14" fill="#F59E0B" text-anchor="middle" font-weight="700">92점</text>
    
    <rect x="130" y="0" width="55" height="45" rx="8" fill="url(#cardBg)" opacity="0.9"/>
    <text x="157" y="18" font-size="9" fill="#A78BFA" text-anchor="middle" font-weight="500">올해</text>
    <text x="157" y="35" font-size="14" fill="#22C55E" text-anchor="middle" font-weight="700">78점</text>
  </g>
  
  <!-- Daeun label -->
  <rect x="255" y="240" width="80" height="28" rx="14" fill="url(#labelBg)" opacity="0.9"/>
  <text x="295" y="259" font-size="11" fill="white" text-anchor="middle" font-weight="500">대운 분석</text>
  
  <defs>
    <radialGradient id="flowGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="timelineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="timelineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dotPast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="dotDecade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="dotNow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="nowRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="dotFuture1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="dotFuture2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="calendarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="calendarHeader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="calendarStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="labelBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
</svg>
