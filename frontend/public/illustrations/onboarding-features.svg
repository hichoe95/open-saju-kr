<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <circle cx="200" cy="150" r="100" fill="url(#bgGlow)" opacity="0.2"/>
  
  <!-- Central phone mockup -->
  <rect x="150" y="40" width="100" height="180" rx="12" fill="#191F28" stroke="#4E5968" stroke-width="2"/>
  <rect x="158" y="55" width="84" height="150" rx="4" fill="url(#screenGradient)"/>
  
  <!-- Phone screen content - chart lines -->
  <path d="M168 140 L185 120 L210 135 L232 100" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M168 160 L185 150 L210 145 L232 155" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="185" cy="120" r="4" fill="#22C55E"/>
  <circle cx="210" cy="135" r="4" fill="#22C55E"/>
  <circle cx="232" cy="100" r="4" fill="#22C55E"/>
  
  <!-- Floating feature cards -->
  <!-- Love card -->
  <g transform="translate(40, 60)">
    <rect width="70" height="70" rx="12" fill="white" filter="url(#cardShadow)"/>
    <circle cx="35" cy="30" r="16" fill="#FEE2E2"/>
    <path d="M35 26 L38 23 A4 4 0 0 1 42 27 L35 34 L28 27 A4 4 0 0 1 32 23 Z" fill="#EF4444"/>
    <text x="35" y="58" font-size="10" fill="#4E5968" text-anchor="middle" font-weight="500">연애운</text>
  </g>
  
  <!-- Money card -->
  <g transform="translate(290, 60)">
    <rect width="70" height="70" rx="12" fill="white" filter="url(#cardShadow)"/>
    <circle cx="35" cy="30" r="16" fill="#FEF3C7"/>
    <text x="35" y="35" font-size="16" fill="#F59E0B" text-anchor="middle" font-weight="700">$</text>
    <text x="35" y="58" font-size="10" fill="#4E5968" text-anchor="middle" font-weight="500">재물운</text>
  </g>
  
  <!-- Career card -->
  <g transform="translate(40, 170)">
    <rect width="70" height="70" rx="12" fill="white" filter="url(#cardShadow)"/>
    <circle cx="35" cy="30" r="16" fill="#DBEAFE"/>
    <rect x="26" y="22" width="18" height="14" rx="2" fill="#3B82F6"/>
    <rect x="30" y="25" width="10" height="3" rx="1" fill="white"/>
    <text x="35" y="58" font-size="10" fill="#4E5968" text-anchor="middle" font-weight="500">커리어</text>
  </g>
  
  <!-- Health card -->
  <g transform="translate(290, 170)">
    <rect width="70" height="70" rx="12" fill="white" filter="url(#cardShadow)"/>
    <circle cx="35" cy="30" r="16" fill="#D1FAE5"/>
    <path d="M27 30 L31 30 L33 25 L37 35 L39 28 L43 30" stroke="#10B981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="35" y="58" font-size="10" fill="#4E5968" text-anchor="middle" font-weight="500">건강운</text>
  </g>
  
  <!-- Connecting lines -->
  <path d="M110 95 L150 100" stroke="#E5E8EB" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M250 100 L290 95" stroke="#E5E8EB" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M110 205 L150 180" stroke="#E5E8EB" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M250 180 L290 205" stroke="#E5E8EB" stroke-width="1.5" stroke-dasharray="4 2"/>
  
  <!-- AI sparkle -->
  <g transform="translate(180, 70)">
    <path d="M20 0 L22 8 L30 10 L22 12 L20 20 L18 12 L10 10 L18 8 Z" fill="#F59E0B"/>
  </g>
  
  <defs>
    <radialGradient id="bgGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>
